name: Smoke test

on:
  workflow_call:
    inputs:
      arch:
        type: string
        required: true
        description: The architecture to test k0s on.
      name:
        type: string
        required: true
        description: The integration test name to be executed.
      k0s-reference-version:
        type: string
        description: >-
          The k0s release version to be used as a reference.
          Mostly used for Autopilot upgrade checks.

permissions:
  contents: read
  models: read

jobs:
  smoketest:
    name: Test
    runs-on: >-
      ${{
        case(
          inputs.arch == 'arm64', 'ubuntu-24.04-arm',
          'ubuntu-24.04'
        )
      }}
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          show-progress: false

      - name: Reclaim runner disk space
        run: .github/workflows/reclaim-runner-disk-space.bash

      - name: Prepare build environment
        run: .github/workflows/prepare-build-env.sh

      - name: Prepare Docker for ipv6 tests
        if: contains(inputs.name, 'dualstack') || contains(inputs.name, 'ipv6')
        run: .github/workflows/prepare-docker-ipv6.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Download compiled executable
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: k0s-linux-${{ inputs.arch }}

      - name: k0s sysinfo
        run: |
          chmod +x k0s
          ./k0s sysinfo

      - name: Download airgap image bundle
        if: contains(inputs.name, 'airgap') || contains(inputs.name, 'ipv6')
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: airgap-image-bundle-linux-${{ inputs.arch }}

      - name: Download ipv6 image bundle
        if: inputs.name == 'calico-ipv6' || inputs.name == 'kuberouter-ipv6' || (startsWith(inputs.name, 'network-conformance-') && contains(inputs.name, '-ipv6'))
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ipv6-test-image-bundle-linux-${{ inputs.arch }}

      - name: Download k0s reference release
        if: inputs.k0s-reference-version != ''
        env:
          K0S_VERSION: ${{ inputs.k0s-reference-version }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSLo "k0s-$K0S_VERSION" --retry 5 --retry-all-errors "https://github.com/k0sproject/k0s/releases/download/$K0S_VERSION/k0s-$K0S_VERSION-${{ inputs.arch }}"
          chmod +x "k0s-$K0S_VERSION"
          ./"k0s-$K0S_VERSION" version
          k0sRealPath="$(realpath "k0s-$K0S_VERSION")"
          echo K0S_UPDATE_FROM_PATH="$k0sRealPath" >>"$GITHUB_ENV"

      - name: Run inttest
        id: inttest
        env:
          SMOKETEST_NAME: check-${{ inputs.name }}
        run: |
          set -o pipefail
          make -C inttest "$SMOKETEST_NAME" 2>&1 | tee inttest.log

      - name: Failure triage
        if: failure() && steps.inttest.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SMOKETEST_NAME: check-${{ inputs.name }}
          SMOKETEST_ARCH: ${{ inputs.arch }}
        run: |
          {
            cat <<EOF
          Analyze this failed k0s smoke test run.

          Classify the likely root cause as exactly one of:
          - flake
          - test bug
          - tested code bug
          - unknown

          Return concise Markdown with:
          - Likely class
          - Confidence: high, medium, or low
          - Reason
          - Evidence from the log
          - Suggested next action

          Prefer "flake" for transient infrastructure, registry, network, cache, artifact, or runner failures.
          Prefer "test bug" when the test harness, cleanup, timing, fixtures, or assertions look suspect.
          Prefer "tested code bug" when k0s behavior, component logs, or deterministic product assertions indicate a regression.
          If there is not enough evidence, say "unknown".

          Smoke test: ${SMOKETEST_NAME}
          Architecture: ${SMOKETEST_ARCH}

          === Smoke test output ===
          EOF

            grep -vE '^go: downloading ' inttest.log | tail -n 400 || true

            for f in /tmp/*.log; do
              [ -f "$f" ] || continue
              echo
              echo "=== Excerpt of errors and warnings in $f ==="
              grep -Eai 'error|fail|fatal|panic|timeout|refused|denied|unhealthy|not ready' "$f" | tail -n 120 || true
            done
          } >model-prompt.md

          jq -n --rawfile prompt model-prompt.md '{
            model: "openai/gpt-4o",
            temperature: 0.1,
            max_tokens: 700,
            messages: [
              {
                role: "system",
                content: "You are a CI failure triage assistant. Be concise, specific, and conservative. Do not claim certainty beyond the log evidence."
              },
              {
                role: "user",
                content: $prompt
              }
            ]
          }' >model-request.json

          curl --fail-with-body -sS \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data-binary @model-request.json \
            https://models.github.ai/inference/chat/completions \
            >model-response.json

          analysis="$(jq -r '.choices[0].message.content // empty' model-response.json)" || {
            exitCode=$?
            cat model-response.json
            exit $exitCode
          }

          {
            echo "## Failure Analysis"
            echo
            echo The following analysis has been generated by \`openai/gpt-4o\`.
            echo It had partial access to the integration test and k0s logs.
            echo Don\'t treat it as the ultimate truth.
            echo
            echo "$analysis"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Collect k0s logs, support bundle and conformance test results
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs.name }}${{ inputs.k0s-reference-version && format('-{0}', inputs.k0s-reference-version) || '' }}-${{ inputs.arch }}-files
          path: |
            /tmp/*.log
            /tmp/support-bundle.tar.gz
            /tmp/*_sonobuoy_*.tar.gz
